name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize React Native Project Wrapper (Android 14 / API 34+)
        run: |
          # Inicializar proyecto con React Native 0.73.6 (targets Android 14 nativamente y es más estable con svg)
          npx react-native@0.73.6 init BuildApp --directory build-app --skip-install --version 0.73.6
          cp -r build-app/android .
          cp build-app/metro.config.js .
          cp build-app/app.json .
          
          # Escribir script de combinación de dependencias y configuración Gradle
          cat << 'EOF' > merge-deps.js
          const fs = require('fs');
          const path = require('path');
          
          // 1. Modificar gradle de nivel raíz para asegurar target 34
          if (fs.existsSync('android/build.gradle')) {
            let rootGradle = fs.readFileSync('android/build.gradle', 'utf8');
            rootGradle = rootGradle.replace(/compileSdkVersions*=s*d+/g, 'compileSdkVersion = 34');
            rootGradle = rootGradle.replace(/targetSdkVersions*=s*d+/g, 'targetSdkVersion = 34');
            fs.writeFileSync('android/build.gradle', rootGradle);
          }
          
          // 2. Modificar gradle de app
          if (fs.existsSync('android/app/build.gradle')) {
            let appGradle = fs.readFileSync('android/app/build.gradle', 'utf8');
            appGradle = appGradle.replace(/minifyEnableds+false/g, 'minifyEnabled true');
            if (!appGradle.includes('shrinkResources')) {
              appGradle = appGradle.replace(/minifyEnableds+true/g, 'minifyEnabled true
            shrinkResources true');
            }
            appGradle = appGradle.replace(/enableProguardInReleaseBuildss*=s*false/g, 'enableProguardInReleaseBuilds = true');
            
            fs.writeFileSync('android/app/build.gradle', appGradle);
          }
          
          // 3. Fusionar dependencias de package.json
          const pkg = JSON.parse(fs.readFileSync('build-app/package.json', 'utf8'));
          pkg.dependencies['react-native-svg'] = '^14.1.0';
          pkg.dependencies['lucide-react-native'] = '^0.350.0';
          pkg.dependencies['@gluestack-ui/themed'] = '^1.1.18';
          pkg.dependencies['@gluestack-ui/config'] = '^1.1.18';
          pkg.dependencies['@gluestack-style/react'] = '^1.0.57';
          pkg.dependencies['react-native-safe-area-context'] = '^4.9.0';
          pkg.dependencies['@expo/vector-icons'] = '^15.1.1';
          pkg.dependencies['expo-font'] = '^12.0.0';
          pkg.dependencies['zustand'] = '^5.0.14';
          
          const detectedDeps = new Set();
          const scanDir = (dir) => {
            const items = fs.readdirSync(dir);
            for (const item of items) {
              if (item === 'node_modules' || item === 'build-app' || item === 'android' || item.startsWith('.')) continue;
              const fullPath = path.join(dir, item);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                scanDir(fullPath);
              } else if (stat.isFile() && /.(jsx?|tsx?)$/.test(item)) {
                const content = fs.readFileSync(fullPath, 'utf8');
                const importRegex = /(?:imports+(?:[ws{},*]+)s+froms+['"]([^'"]+)['"])|(?:imports+['"]([^'"]+)['"])|(?:requires*(s*['"]([^'"]+)['"]s*))/g;
                let match;
                while ((match = importRegex.exec(content)) !== null) {
                  const importPath = match[1] || match[2] || match[3];
                  if (importPath) {
                    let pkgName = importPath;
                    if (importPath.startsWith('@')) {
                      const parts = importPath.split('/');
                      if (parts.length >= 2) pkgName = parts[0] + '/' + parts[1];
                    } else {
                      pkgName = importPath.split('/')[0];
                    }
                    if (!pkgName.startsWith('.') && !pkgName.startsWith('/') && 
                        pkgName !== 'react-native' && pkgName !== 'react' && pkgName !== 'react-dom') {
                      detectedDeps.add(pkgName);
                    }
                  }
                }
              }
            }
          };
          
          try {
            scanDir('.');
          } catch(err) {
            console.error('Error durante escaneo:', err);
          }
          
          // Versiones estables pre-configuradas para evitar resolver 'latest' inestables
          const defaultVersions = {
            'expo-status-bar': '^1.11.1',
            '@react-navigation/native': '^6.1.18',
            '@react-navigation/stack': '^6.4.1',
            '@react-navigation/bottom-tabs': '^6.6.1',
            'react-native-screens': '^3.35.0',
            'react-native-gesture-handler': '^2.21.2',
            'react-native-reanimated': '^3.6.2',
            'react-native-paper': '^5.12.3',
            'canvas-confetti': '^1.9.3'
          };
          
          for (const dep of detectedDeps) {
            if (!pkg.dependencies[dep]) {
              const version = defaultVersions[dep] || 'latest';
              pkg.dependencies[dep] = version;
              console.log('[Autodetect] Inyectando dependencia:', dep, '@', version);
            }
          }
          
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          EOF
          
          node merge-deps.js
          rm merge-deps.js
          rm -rf build-app
          rm -f App.tsx
          
          # 4. Asegurar que exista index.js con GluestackUIProvider en la raíz para bundling
          if [ ! -f index.js ]; then
            echo "import React from 'react';" > index.js
            echo "import { AppRegistry } from 'react-native';" >> index.js
            echo "import { GluestackUIProvider } from '@gluestack-ui/themed';" >> index.js
            echo "import { config } from '@gluestack-ui/config';" >> index.js
            echo "import App from './App';" >> index.js
            echo "import { name as appName } from './app.json';" >> index.js
            echo "const RootApp = () => (" >> index.js
            echo "  <GluestackUIProvider config={config}>" >> index.js
            echo "    <App />" >> index.js
            echo "  </GluestackUIProvider>" >> index.js
            echo ");" >> index.js
            echo "AppRegistry.registerComponent(appName, () => RootApp);" >> index.js
            echo "Creado archivo index.js con GluestackUIProvider"
          fi

      - name: Install Project Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Build Release APK (with Proguard/R8 Shrinking)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Build Release v1.0.0-build-${{ github.run_number }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
